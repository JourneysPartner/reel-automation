<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 520px; margin: 0 auto; padding: 16px; color: #1b2838; background: #f7f4ee; }
      h2 { margin: 8px 0 4px; }
      .meta { color: #555; font-size: 14px; margin: 2px 0; }
      .preview { width: 100%; aspect-ratio: 9/16; border: 0; border-radius: 12px; background: #000; margin: 12px 0; }
      .slide { width: 100%; border-radius: 10px; margin: 8px 0; display: block; }
      .link { display: inline-block; margin: 6px 0 16px; color: #1a73e8; }
      form { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
      button { font-size: 18px; font-weight: 700; padding: 16px; border: 0; border-radius: 12px; color: #fff; }
      .approve { background: #1a8a4a; }
      .reject { background: #d97706; }
      .skip { background: #8a8a8a; }
      textarea { width: 100%; box-sizing: border-box; font-size: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; resize: vertical; }
      .hint { color: #777; font-size: 13px; margin: 10px 0 2px; }
      .done { background: #fff; border-radius: 12px; padding: 16px; text-align: center; color: #444; }
    </style>
  </head>
  <body>
    <h2><?= type === 'carousel' ? 'カルーセル確認' : 'リール確認' ?></h2>
    <p class="meta">公開予定: <?= publishDate ?></p>
    <p class="meta">テーマ: <?= theme ?></p>

    <? if (type === 'carousel') { ?>
      <? var imgs = []; try { imgs = JSON.parse(previewUrl); } catch (e) {} ?>
      <? for (var i = 0; i < imgs.length; i++) { ?>
      <img class="slide" src="<?= imgs[i] ?>" />
      <? } ?>
    <? } else if (previewUrl) { ?>
      <video class="preview" src="<?= previewUrl ?>" controls playsinline preload="metadata"></video>
      <a class="link" href="<?= previewUrl ?>" target="_blank">▶ 別タブで開く</a>
    <? } ?>

    <? if (status === 'approved' || status === 'skipped') { ?>
    <div class="done">この投稿は既に「<?= status ?>」です。</div>
    <? } else { ?>
    <form method="post" action="<?= scriptUrl ?>">
      <input type="hidden" name="id" value="<?= id ?>" />
      <input type="hidden" name="token" value="<?= token ?>" />
      <button class="approve" type="submit" name="action" value="approve">✅ 公開する（予定日に投稿）</button>

      <p class="hint">差し戻す場合は、修正内容を書いてから下のボタンを押してください</p>
      <textarea name="comment" rows="3" placeholder="例: 数字をもっと具体的に / 締めをやわらかく / フックを別案に"></textarea>
      <button class="reject" type="submit" name="action" value="reject">✏️ 差し戻して再生成</button>

      <button class="skip" type="submit" name="action" value="skip">⏭ 今回は見送り</button>
    </form>
    <? } ?>
  </body>
</html>

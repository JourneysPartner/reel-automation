# ターゲットペルソナ定義
# 各投稿は target_persona を1つ指定する

personas:
  - id: freelancer
    name: "フリーランス・個人事業主"
    attributes: "30代前半・月商50〜150万円・確定申告は自分でやってきたが不安あり"
    pain_points:
      - "経費の按分や勘定科目に毎回悩む"
      - "税務署からの問い合わせが来たらどうしようと不安"
      - "インボイス制度・電子帳簿保存法への対応が後手"
      - "売上が伸びてきて青色申告→法人化のタイミングが分からない"
    goals:
      - "間違いのない申告でリスクを下げたい"
      - "最低限の労力で最大限の合法的節税をしたい"
      - "本業の時間を税務作業に奪われたくない"

  - id: ec_seller
    name: "EC物販・ネットショップ運営者"
    attributes: "30代後半・年商3000万〜2億・Amazon/楽天/Shopify中心・在庫あり"
    pain_points:
      - "在庫評価の方法が正しいのか分からない"
      - "海外仕入れ・関税・消費税の扱いが複雑"
      - "プラットフォーム手数料・広告費の経費処理"
      - "資金繰りと税金支払いタイミングが噛み合わない"
    goals:
      - "売上拡大期の資金繰りを安定させたい"
      - "繁忙期前後のキャッシュフロー設計を相談したい"
      - "法人化・分社化の判断軸を持ちたい"

  - id: influencer
    name: "インフルエンサー・クリエイター"
    attributes: "20代後半〜30代・YouTube/Instagram/TikTok・年収1000万〜1億"
    pain_points:
      - "PR案件・広告収入・グッズ販売など収益源が多様で処理が複雑"
      - "海外プラットフォームからの収入の税務処理"
      - "経費認定の線引きが難しい（衣装・撮影機材・自宅スタジオ）"
      - "ある日急に稼げなくなった時の備え"
    goals:
      - "今稼いでいる時期に正しく資産を残したい"
      - "クリエイター業に詳しい税理士に任せたい"
      - "税務調査が入ってもびくともしない体制を作りたい"

  - id: smb_owner
    name: "中小企業経営者"
    attributes: "40〜60代・年商1〜10億・従業員5〜30名・複数拠点ありの場合も"
    pain_points:
      - "顧問税理士に任せきりで内容を理解できていない"
      - "事業承継・相続のタイミングで何を準備すべきか不明"
      - "節税商品・保険の営業が多く判断に迷う"
      - "資金調達と税務戦略の連動ができていない"
    goals:
      - "経営判断と税務戦略を統合的に見てほしい"
      - "事業承継までの10年プランを設計したい"
      - "リスクを早期に検知できる体制が欲しい"

  - id: wealth_holder
    name: "資産家・富裕層個人"
    attributes: "50代以上・金融資産1億以上・不動産複数所有・相続対象世代"
    pain_points:
      - "相続税・贈与税の試算が頭の中だけになっている"
      - "海外資産・暗号資産の申告漏れリスク"
      - "家族信託・生前贈与のスキーム選択"
      - "税務調査経験者から「次は必ず来る」と言われた"
    goals:
      - "家族に負担をかけずに資産を承継したい"
      - "ワンストップで相続・贈与・所得を見てほしい"
      - "税務調査に強い体制を整えたい"
